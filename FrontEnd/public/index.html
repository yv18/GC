<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0d0e1a" />

    <title>GroupChat</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* Critical mobile resets */
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* Prevent iOS bounce/overscroll on the root */
        overflow: hidden;
        position: fixed;
        /* Prevent font size inflation on iOS landscape */
        -webkit-text-size-adjust: 100%;
      }

      #emp-Data {
        width: 100%;
        height: 100%;
        /* Use dvh (dynamic viewport height) so iOS Safari toolbar is accounted for */
        height: 100dvh;
      }

      /* iOS safe area support (notch / home bar) */
      .safe-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .safe-top {
        padding-top: env(safe-area-inset-top);
      }

      /* Prevent inputs from zooming on iOS (font-size must be >= 16px) */
      input, textarea {
        font-size: 16px !important;
      }

      /* Smooth scrolling for message list */
      .scrollable {
        -webkit-overflow-scrolling: touch;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div id="emp-Data"></div>

    <!-- vendor FIRST, then app -->
    <script src="./vendor.bundle.js"></script>
    <script src="./app.bundle.js"></script>
  </body>
</html>
