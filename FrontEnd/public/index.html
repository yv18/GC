<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0b14" />
    <title>GroupChat</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      /*
       * iOS Safari viewport fix — the ONLY approach that works reliably:
       * 1. html/body get 100% height (fills the viewport)
       * 2. NO position:fixed on body (breaks when keyboard opens)
       * 3. The app root uses an absolute inset:0 so it always fills exactly
       *    the available space, shrinking when the iOS keyboard appears
       */
      html {
        height: 100%;
        overflow: hidden;
        background: #0a0b14;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0b14;
      }

      #emp-Data {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
      }

      /*
       * iOS keyboard fix: when the keyboard opens on iOS, the visual
       * viewport shrinks. Using position:absolute on #emp-Data (not fixed)
       * means it shrinks with the visual viewport correctly.
       * This is more reliable than 100dvh on older iOS versions.
       */

      /* Prevent iOS input zoom — font-size must be >= 16px */
      input, textarea, select {
        font-size: 16px !important;
        /* Prevent iOS double-tap zoom on inputs */
        touch-action: manipulation;
      }

      /* Prevent rubber-band scroll on the root */
      body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: auto;
      }
    </style>
  </head>
  <body>
    <div id="emp-Data"></div>
    <script src="./vendor.bundle.js"></script>
    <script src="./app.bundle.js"></script>
  </body>
</html>
